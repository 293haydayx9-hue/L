    <style>
        /* (ประกาศตัวแปรโทนสีเดิมคงไว้...) */
        :root {
            --bg-main: #0B0D12; 
            --bg-card: #1A1D23;
            --bg-border: #2A2E36;
            --shadow-mid: #3F444D;
            --shadow-light: #6B7078;
            --text-muted: #9FA4AA;
            --accent-gold: #C9C2A3;
            --text-main: #E8DFC2;
            --deep-black: #111317;
            --deep-gray: #2F333B;
        }

        body { 
            font-family: 'Kanit', sans-serif; 
            overflow-x: hidden; 
            background-color: var(--bg-main); 
            color: var(--text-main);
            /* เพิ่มเอฟเฟกต์หมอกดาวจางๆ */
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(63, 68, 77, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(201, 194, 163, 0.05) 0%, transparent 40%);
        }

        /* 🌟 ปรับปรุงพื้นหลังดาวและดาวตก 🌟 */
        .sky-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: -1; overflow: hidden;
            background: linear-gradient(to bottom, #0B0D12 0%, #111317 100%);
        }

        /* หมู่ดาวกะพริบ */
        .stars-static {
            position: absolute; width: 100%; height: 100%;
            background-image: 
                radial-gradient(1px 1px at 10% 10%, #fff, transparent),
                radial-gradient(1px 1px at 20% 50%, var(--accent-gold), transparent),
                radial-gradient(2px 2px at 40% 80%, #fff, transparent),
                radial-gradient(1px 1px at 60% 20%, var(--text-muted), transparent),
                radial-gradient(2px 2px at 80% 40%, #fff, transparent),
                radial-gradient(1px 1px at 90% 90%, var(--accent-gold), transparent);
            background-size: 300px 300px;
            animation: twinkle 5s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.3; }
            100% { opacity: 0.8; }
        }

        /* ปรับปรุงดาวตกให้เห็นชัดและมากขึ้น */
        .shooting-star {
            position: absolute;
            height: 2px;
            background: linear-gradient(-45deg, var(--accent-gold), rgba(0, 0, 255, 0));
            filter: drop-shadow(0 0 6px var(--accent-gold));
            animation: tail 4s ease-in-out infinite, shooting 4s ease-in-out infinite;
            opacity: 0;
        }

        @keyframes tail {
            0% { width: 0; }
            30% { width: 150px; }
            100% { width: 0; }
        }

        @keyframes shooting {
            0% { transform: translateX(0) translateY(0) rotate(35deg); opacity: 0; }
            10% { opacity: 1; }
            30% { transform: translateX(-600px) translateY(600px) rotate(35deg); opacity: 0; }
            100% { transform: translateX(-600px) translateY(600px) rotate(35deg); opacity: 0; }
        }

        /* ตำแหน่งดาวตกต่างๆ */
        .s-1 { top: 0%; right: 10%; animation-delay: 0s; }
        .s-2 { top: 20%; right: -5%; animation-delay: 1.2s; }
        .s-3 { top: -10%; right: 40%; animation-delay: 2.5s; }
        .s-4 { top: 50%; right: 0%; animation-delay: 3.8s; }
        .s-5 { top: 30%; right: 60%; animation-delay: 0.5s; }
        .s-6 { top: 10%; right: 25%; animation-delay: 5s; }

        /* (ส่วน Content Box, Nav, ฯลฯ ใช้โค้ดเดิมของคุณได้เลยครับ) */
        .glass-box {
            background: rgba(26, 29, 35, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid var(--bg-border);
            box-shadow: 0 8px 32px 0 rgba(11, 13, 18, 0.5);
        }
        /* ... โค้ดส่วนอื่นๆ คงไว้ตามเดิม ... */
    </style>
</head>
<body>

    <div class="sky-container">
        <div class="stars-static"></div>
        <div class="shooting-star s-1"></div>
        <div class="shooting-star s-2"></div>
        <div class="shooting-star s-3"></div>
        <div class="shooting-star s-4"></div>
        <div class="shooting-star s-5"></div>
        <div class="shooting-star s-6"></div>
    </div>
