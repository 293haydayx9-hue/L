    <script>
        function changeTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => {
                el.classList.remove('text-black', 'border-b-2', 'border-black');
                el.classList.add('text-gray-500');
            });
            document.getElementById(tabId).classList.add('active');
            const activeBtn = document.querySelector(`.nav-btn[data-target="${tabId}"]`);
            activeBtn.classList.remove('text-gray-500');
            activeBtn.classList.add('text-black', 'border-b-2', 'border-black');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '0', width: '0',
                playerVars: {
                    listType: 'playlist',
                    list: 'PLHxDBCHg5cGO1juL0HRcJiYYus393MWkm',
                    autoplay: 1, 
                    loop: 1, 
                    controls: 0,
                    mute: 0
                },
                events: { 'onReady': onPlayerReady }
            });
        }

        function onPlayerReady(event) { 
            event.target.playVideo(); 
        }

        document.body.addEventListener('click', function() {
            if (player && player.getPlayerState && player.getPlayerState() !== YT.PlayerState.PLAYING) {
                player.playVideo();
            }
        }, { once: true });

        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        // ระบบดึงรูปภาพอัตโนมัติจาก Google Sheets
        async function loadPortfolio() {
            const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT6Kp5sH2tv2KWttHXJvgxh3Lo1yAkNE-m2qjjYdR68C7pE8IJ0hWCMKsYkRn891OIKQJI_JKFJaa5b/pub?output=csv'; 
            
            try {
                const response = await fetch(sheetUrl);
                const data = await response.text();
                const rows = data.split('\n').slice(1); // ข้ามแถวที่ 1 (หัวตาราง)
                
                let htmlContent = '';
                rows.forEach(row => {
                    const firstComma = row.indexOf(','); // แยกข้อมูลด้วยลูกน้ำ
                    if (firstComma > 0) {
                        // เพิ่มการลบเครื่องหมายฟันหนู (") และช่องว่างส่วนเกินออกจากลิงก์รูป
                        const imgUrl = row.substring(0, firstComma).replace(/["\r]/g, '').trim();
                        // ลบเครื่องหมายฟันหนู (") ออกจากชื่อผลงาน
                        const title = row.substring(firstComma + 1).replace(/["\r]/g, '').trim();
                        
                        if (imgUrl !== '') {
                            htmlContent += `
                            <div class="relative group rounded-xl overflow-hidden shadow-sm">
                                <img src="${imgUrl}" class="w-full h-full object-cover transition transform group-hover:scale-110" alt="Work">
                                <div class="absolute bottom-0 left-0 right-0 bg-black bg-opacity-70 text-white p-2 text-center text-sm font-bold opacity-0 group-hover:opacity-100 transition">${title}</div>
                            </div>`;
                        }
                    }
                });
                
                if(htmlContent !== '') {
                    document.getElementById('portfolio-gallery').innerHTML = htmlContent;
                } else {
                    document.getElementById('portfolio-gallery').innerHTML = '<p class="text-center text-gray-500 col-span-full">ยังไม่มีผลงานในระบบ</p>';
                }
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('portfolio-gallery').innerHTML = '<p class="text-center text-red-500 col-span-full">ไม่สามารถเชื่อมต่อฐานข้อมูลได้</p>';
            }
        }
        
        // สั่งให้ระบบเริ่มดึงข้อมูลทันทีที่เปิดเว็บ
        loadPortfolio();
    </script>
